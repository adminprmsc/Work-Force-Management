# ──────────────────────────────────────────────────────────────────────────────
# Work Force Management — Production stack (single VM, fully Dockerized)
#
#   postgres  →  database (private, never exposed to the internet)
#   migrate   →  one-shot job: `prisma migrate deploy` (+ idempotent seed)
#   api       →  NestJS API (private, reachable only via the edge proxy)
#   web       →  Nginx edge: serves the React SPA + reverse-proxies /api
#
# Only the `web` service publishes a port, so the whole app lives behind one
# origin (no CORS). The database and API stay on the internal Docker network.
#
# Usage:
#   cp .env.prod.example .env            # then edit secrets
#   docker compose -f docker-compose.prod.yml up -d --build
# ──────────────────────────────────────────────────────────────────────────────

name: wfm-production

x-db-url: &database_url
  DATABASE_URL: postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}?schema=public

services:
  postgres:
    image: postgres:16-alpine
    container_name: wfm-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./backend/docker/postgres/init:/docker-entrypoint-initdb.d:ro
    # Not published by default — DB is private. For admin access use an SSH
    # tunnel (see DEPLOYMENT.md) or temporarily uncomment a localhost bind:
    # ports:
    #   - '127.0.0.1:5432:5432'
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}']
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 10s
    networks:
      - wfm

  # Runs on every `up`/deploy. Applies all pending migrations (including the
  # first one on a fresh DB) before the API is allowed to start, so schema and
  # code are never out of sync.
  migrate:
    build:
      context: ./backend
      dockerfile: Dockerfile
      target: migrate
    image: wfm-api:migrate
    container_name: wfm-migrate
    restart: 'no'
    environment:
      <<: *database_url
      RUN_SEED: ${RUN_SEED:-true}
      SEED_SENIOR_MANAGER_EMAIL: ${SEED_SENIOR_MANAGER_EMAIL}
      SEED_SENIOR_MANAGER_USERNAME: ${SEED_SENIOR_MANAGER_USERNAME}
      SEED_SENIOR_MANAGER_PASSWORD: ${SEED_SENIOR_MANAGER_PASSWORD}
      SEED_RA_ES_PASSWORD: ${SEED_RA_ES_PASSWORD}
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - wfm

  api:
    build:
      context: ./backend
      dockerfile: Dockerfile
      target: production
    image: wfm-api:production
    container_name: wfm-api
    restart: unless-stopped
    environment:
      <<: *database_url
      NODE_ENV: production
      PORT: 3000
      JWT_SECRET: ${JWT_SECRET}
      JWT_EXPIRES_IN: ${JWT_EXPIRES_IN:-1d}
      CORS_ORIGINS: ${CORS_ORIGINS:-}
    # No published ports — only the edge proxy can reach the API.
    expose:
      - '3000'
    depends_on:
      migrate:
        condition: service_completed_successfully
    healthcheck:
      test: ['CMD-SHELL', 'wget -qO- http://localhost:3000/api/health || exit 1']
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s
    networks:
      - wfm

  web:
    build:
      context: ./frontend/webapp
      dockerfile: Dockerfile
      target: production
      args:
        # Same-origin path proxied to the API by Nginx (baked in at build time).
        VITE_API_BASE_URL: ${VITE_API_BASE_URL:-/api}
    image: wfm-web:production
    container_name: wfm-web
    restart: unless-stopped
    ports:
      - '${WEB_HTTP_PORT:-80}:80'
    depends_on:
      api:
        condition: service_healthy
    healthcheck:
      test: ['CMD-SHELL', 'wget -qO- http://localhost/healthz || exit 1']
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    networks:
      - wfm

networks:
  wfm:
    driver: bridge

volumes:
  postgres_data:
    name: wfm_postgres_data
