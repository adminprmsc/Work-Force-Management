# Local development — PostgreSQL + API (hot-reload)
# Usage: npm run docker:dev
# API is published on API_PORT from .env (default 3001). Do not run npm run dev:local
# on the same machine at the same time — it uses PORT from .env and must differ from API_PORT.

name: wfm-local

services:
  postgres:
    image: postgres:16-alpine
    pull_policy: if_not_present
    container_name: wfm-postgres-local
    restart: unless-stopped
    env_file:
      - .env
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    ports:
      - '${POSTGRES_PORT}:5432'
    volumes:
      - postgres_local_data:/var/lib/postgresql/data
      - ./docker/postgres/init:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test:
        ['CMD-SHELL', 'pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}']
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 10s
    networks:
      - wfm

  migrate:
    build:
      context: .
      dockerfile: Dockerfile
      target: migrate
      pull: false
    container_name: wfm-migrate-local
    env_file:
      - .env
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}
    depends_on:
      postgres:
        condition: service_healthy
    restart: 'no'
    networks:
      - wfm

  api:
    build:
      context: .
      dockerfile: Dockerfile
      target: development
      pull: false
    container_name: wfm-api-local
    restart: unless-stopped
    env_file:
      - .env
    environment:
      NODE_ENV: development
      PORT: 3000
      DATABASE_URL: postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}
    ports:
      - '${API_PORT}:3000'
    volumes:
      - .:/app
      - api_node_modules:/app/node_modules
    depends_on:
      migrate:
        condition: service_completed_successfully
    healthcheck:
      test:
        [
          'CMD-SHELL',
          'wget -qO- http://localhost:3000/api/health || exit 1',
        ]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    networks:
      - wfm

networks:
  wfm:
    driver: bridge

volumes:
  postgres_local_data:
  api_node_modules:
