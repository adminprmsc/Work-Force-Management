# WFM edge server: serves the React SPA and reverse-proxies the API so the
# browser only ever talks to one origin (no CORS in production).

upstream wfm_api {
    # "api" is the service name on the Compose network.
    server api:3000;
    keepalive 32;
}

# Drop overly long request bodies early; raise if you add large uploads.
client_max_body_size 10m;

server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # ── Security headers ─────────────────────────────────────────────────────
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    # ── Compression ──────────────────────────────────────────────────────────
    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_proxied any;
    gzip_types
        text/plain
        text/css
        text/javascript
        application/javascript
        application/json
        application/xml
        image/svg+xml;

    # ── Edge health check (used by the container HEALTHCHECK / load balancer) ─
    location = /healthz {
        access_log off;
        add_header Content-Type text/plain;
        return 200 "ok\n";
    }

    # ── API reverse proxy ─────────────────────────────────────────────────────
    # Requests to /api/* are forwarded untouched to the NestJS backend, which
    # serves everything under its own global "/api" prefix.
    location /api/ {
        proxy_pass http://wfm_api;
        proxy_http_version 1.1;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Connection        "";
        proxy_read_timeout 60s;
        proxy_send_timeout 60s;
    }

    # ── Static assets (long cache; filenames are content-hashed by Vite) ──────
    location /assets/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }

    # ── SPA fallback: every other route returns index.html ───────────────────
    location / {
        try_files $uri $uri/ /index.html;
    }
}
